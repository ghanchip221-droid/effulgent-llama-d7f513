<!DOCTYPE html>
<html>

<head>
<title>Admin Dashboard</title>
</head>

<body>

<h2>Ambika Hardware Admin</h2>

<input id="name" placeholder="Product Name"><br><br>

<input id="price" placeholder="Price"><br><br>

<select id="category">

<option value="locks">Locks</option>
<option value="handles">Handles</option>
<option value="tools">Tools</option>

</select>

<br><br>

<input id="image" placeholder="Image path (uploads/product.jpg)">

<br><br>

<button onclick="addProduct()">Upload Product</button>

<script>

let products=[]

function addProduct(){

let product={
name:document.getElementById("name").value,
price:document.getElementById("price").value,
category:document.getElementById("category").value,
image:document.getElementById("image").value
}

products.push(product)

localStorage.setItem("products",JSON.stringify(products))

alert("Product uploaded!")

}

</script>

</body>

</html>
